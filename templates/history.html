<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diagnosis History — Plant Disease Detector</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <style>
    .history-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      transition: box-shadow 0.15s;
    }
    .history-card:hover { box-shadow: var(--shadow-md); }
    .history-thumb {
      width: 64px; height: 64px;
      object-fit: cover;
      border-radius: var(--radius-sm);
      flex-shrink: 0;
      background: var(--bg-secondary);
    }
    .history-thumb-placeholder {
      width: 64px; height: 64px;
      border-radius: var(--radius-sm);
      background: var(--bg-secondary);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 24px;
    }
    .history-info { flex: 1; min-width: 0; }
    .history-disease { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
    .history-plant { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; }
    .history-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .history-time { font-size: 11px; color: var(--text-tertiary); font-family: 'DM Mono', monospace; }
    .severity-pill {
      font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 500;
    }
    .severity-None, .severity-Healthy { background: var(--green-light); color: var(--green-dark); }
    .severity-Mild { background: #FFF8E1; color: #B45309; }
    .severity-Moderate { background: #FEF3C7; color: #92400E; }
    .severity-Severe { background: #FEF2F2; color: #DC2626; }
    .empty-state {
      text-align: center; padding: 3rem 1rem;
      color: var(--text-tertiary);
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-title { font-size: 16px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }
    .clear-btn {
      background: none; border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 6px 14px;
      font-size: 13px; color: var(--text-secondary);
      cursor: pointer; transition: all 0.15s;
    }
    .clear-btn:hover { border-color: var(--red); color: var(--red); }
    .confidence-mini {
      font-size: 11px; font-family: 'DM Mono', monospace;
      color: var(--green-dark); font-weight: 500;
    }
    .history-list { display: flex; flex-direction: column; gap: 10px; }
    .page-title { font-size: 18px; font-weight: 600; color: var(--text); }
    .page-subtitle { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
    .delete-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 6px;
      cursor: pointer;
      color: var(--text-tertiary);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      align-self: flex-start;
      transition: all 0.15s;
    }
    .delete-btn:hover {
      border-color: #DC2626;
      color: #DC2626;
      background: #FEF2F2;
    }
    .count-badge {
      background: var(--bg-secondary); color: var(--text-secondary);
      font-size: 12px; padding: 3px 10px; border-radius: 99px;
      font-family: 'DM Mono', monospace;
    }
  </style>
</head>
<body>
  <div class="app-wrapper">
    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <a href="/" style="display:flex;align-items:center;text-decoration:none;">
          <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" class="logo-icon">
            <path d="M8 40 C12 28 24 12 40 8 C40 8 40 24 28 34 C20 40 8 40 8 40Z" fill="#1D9E75" opacity="0.9"/>
            <path d="M8 40 L22 26" stroke="#085041" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </a>
        <div>
          <h2 class="page-title">Diagnosis History</h2>
          <p class="page-subtitle">Past leaf analyses</p>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span class="count-badge" id="countBadge">0 records</span>
        <a href="/" style="display:inline-flex;align-items:center;gap:6px;background:#1D9E75;color:#fff;font-size:13px;font-weight:500;padding:7px 16px;border-radius:99px;text-decoration:none;">
          &#8592; Back to Analyzer
        </a>
      </div>
    </div>

    <div class="divider"></div>

    <!-- History List -->
    <div id="historyList" class="history-list"></div>

    <!-- Clear button -->
    <div id="clearRow" style="text-align:center;margin-top:1.25rem;display:none;">
      <button class="clear-btn" onclick="clearHistory()">🗑 Clear all history</button>
    </div>
  </div>

  <script>
    function loadHistory() {
      const raw = localStorage.getItem('plantDiagnosisHistory');
      return raw ? JSON.parse(raw) : [];
    }

    function clearHistory() {
      if (confirm('Delete all diagnosis history?')) {
        localStorage.removeItem('plantDiagnosisHistory');
        function deleteRecord(index) {
      const raw = localStorage.getItem('plantDiagnosisHistory');
      const history = raw ? JSON.parse(raw) : [];
      history.splice(index, 1);
      localStorage.setItem('plantDiagnosisHistory', JSON.stringify(history));
      render();
    }

    render();
      }
    }

    function formatTime(ts) {
      const d = new Date(ts);
      return d.toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' }) +
             ' · ' + d.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' });
    }

    function severityClass(item) {
      if (item.health_status === 'Healthy') return 'severity-Healthy';
      return 'severity-' + (item.severity || 'None');
    }

    function severityLabel(item) {
      if (item.health_status === 'Healthy') return 'Healthy';
      return item.severity || 'Unknown';
    }

    function render() {
      const history = loadHistory();
      const list = document.getElementById('historyList');
      const countBadge = document.getElementById('countBadge');
      const clearRow = document.getElementById('clearRow');

      countBadge.textContent = history.length + ' record' + (history.length !== 1 ? 's' : '');

      if (history.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🌿</div>
            <p class="empty-title">No diagnoses yet</p>
            <p style="font-size:13px;">Go analyze a leaf to see results here.</p>
            <a href="/" style="display:inline-flex;align-items:center;gap:6px;background:#1D9E75;color:#fff;font-size:13px;font-weight:500;padding:7px 16px;border-radius:99px;text-decoration:none;margin-top:1rem;">Start analyzing</a>
          </div>`;
        clearRow.style.display = 'none';
        return;
      }

      clearRow.style.display = 'block';
      // reversed copy with original indices for deletion
      const reversed = [...history].map((item, i) => ({ item, i })).reverse();
      list.innerHTML = reversed.map(({ item, i }) => `
        <div class="history-card" id="card-${i}">
          ${item.thumbnail
            ? `<img class="history-thumb" src="${item.thumbnail}" alt="leaf"/>`
            : `<div class="history-thumb-placeholder">🍃</div>`}
          <div class="history-info">
            <p class="history-disease">${item.disease_name || (item.health_status === 'Healthy' ? 'No disease detected' : 'Unknown')}</p>
            <p class="history-plant">${item.plant_name ? '🌱 ' + item.plant_name : 'Plant unidentified'}</p>
            <div class="history-meta">
              <span class="severity-pill ${severityClass(item)}">${severityLabel(item)}</span>
              <span class="confidence-mini">${item.confidence || 0}% confidence</span>
              <span class="history-time">${formatTime(item.timestamp)}</span>
            </div>
            ${item.summary ? `<p style="font-size:12px;color:var(--text-secondary);margin-top:6px;line-height:1.5;">${item.summary}</p>` : ''}
          </div>
          <button class="delete-btn" onclick="deleteRecord(${i})" title="Delete this record">
            <svg viewBox="0 0 20 20" fill="none" style="width:14px;height:14px;">
              <path d="M3 5h14M8 5V3h4v2M6 5l1 12h6l1-12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      `).join('');
    }

    function deleteRecord(index) {
      const raw = localStorage.getItem('plantDiagnosisHistory');
      const history = raw ? JSON.parse(raw) : [];
      history.splice(index, 1);
      localStorage.setItem('plantDiagnosisHistory', JSON.stringify(history));
      render();
    }

    render();
  </script>
</body>
</html>
